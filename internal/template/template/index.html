<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/style.css">
    <title>file upload</title>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col">
                <div class="card shadow">
                    <div class="card-header text-center" style="width: 100%;">
                        <img src="/uploads/qrcode.jpeg" class="img-fluid">
                    </div>
                    <div class="card-body">
                        <div class="drop-zone" id="dropZone">
                            <div class="drop-zone-icon">📁</div>
                            <h5>Drag and drop your file here</h5>
                            <p class="text-muted">or click to select</p>
                        </div>
                        <input type="file" id="fileInput" name="file">
                        <div id="uploadStatus" class="mt-3"></div>

                        <hr class="my-4">

                        <h5 class="mb-3">Uploaded Files</h5>
                        <div id="filesList" class="list-group">
                            <div class="list-group-item text-muted">Loading files...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="/static/js/browser.js">

    </script>
</body>

</html>
